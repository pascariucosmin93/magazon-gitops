apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - worker2
      containers:
        - name: ollama
          image: ollama/ollama:0.12.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: ollama-config
                  key: model
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    for _ in $(seq 1 60); do
                      ollama list >/dev/null 2>&1 && break
                      sleep 2
                    done
                    ollama show "$OLLAMA_MODEL" >/dev/null 2>&1 || ollama pull "$OLLAMA_MODEL"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ollama show "$OLLAMA_MODEL" >/dev/null 2>&1
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 11434
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
