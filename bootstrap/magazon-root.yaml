apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: magazon-root
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/pascariucosmin93/magazon-gitops.git
    targetRevision: main
    path: applications
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
